name: Scrape FedWatch Data

on:
  schedule:
    # 30分おきに実行 (例: 00:00, 00:30, 01:00...)
    - cron: '*/30 * * * *'
  # 手動でも実行できるようにする
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraping script
        run: npm run scrape

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code src/data/fedwatch.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/data/fedwatch.json
          # [skip ci] を含めることで Vercel などの不要なデプロイビルドをスキップします
          git commit -m "chore: update FedWatch data [skip ci]"
          git push
